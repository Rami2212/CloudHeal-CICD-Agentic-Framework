model_name_or_path: Qwen/Qwen2.5-Coder-7B-Instruct
train_file: datasets/annotated/train.jsonl
validation_file: datasets/annotated/val.jsonl
test_file: datasets/annotated/test.jsonl
output_dir: experiments/checkpoints/cloudheal-qwen25-coder-7b-lora
max_seq_length: 8192
num_train_epochs: 2
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 0.0002
warmup_ratio: 0.03
logging_steps: 10
save_steps: 500
seed: 42
gradient_checkpointing: true
system_prompt: You are a helpful coding assistant.
max_train_samples: null
max_eval_samples: null
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
precision:
  use_bf16_if_supported: true
  fallback_fp16: false

